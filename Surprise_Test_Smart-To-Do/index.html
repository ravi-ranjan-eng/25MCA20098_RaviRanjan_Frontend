<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart To-Do Manager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .overdue {
      border: 2px solid red;
    }
  </style>
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Smart To-Do Manager</h2>

  <div class="row g-2 mb-3"> 
    <div class="justify-content-center d-flex ">
      <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
    </div>
    <div class="justify-content-center d-flex">
      <select id="priorityInput" class="form-select">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>
    <div class="justify-content-center d-flex">
      <input type="date" id="dateInput" class="form-control">
    </div>
    <div class="justify-content-center d-flex">
      <button onclick="addTask()" class="btn btn-primary w-100">Add</button>
    </div>
  </div>

  <div class="d-flex gap-2 justify-content-center">
    <button class="btn btn-secondary" onclick="setFilter('all')">All</button>
    <button class="btn btn-success" onclick="setFilter('completed')">Completed</button>
    <button class="btn btn-warning" onclick="setFilter('pending')">Pending</button>
  </div><br>

  <div class="mb-3">
    <select id="sortSelect" class="form-select w-50">
      <option value="">Sort By</option>
      <option value="priority">Priority (High → Low)</option>
      <option value="deadline">Deadline (Nearest)</option>
    </select>
  </div>

  <div class="mb-3">
    <strong>Total:</strong> <span id="totalCount">0</span> |
    <strong>Completed:</strong> <span id="completedCount">0</span> |
    <strong>Pending:</strong> <span id="pendingCount">0</span>
  </div>

  <div id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

function debounce(func, delay) {
  let timeout;
  return function() {
    clearTimeout(timeout);
    timeout = setTimeout(() => func(), delay);
  };
}

const debouncedRender = debounce(renderTasks, 300);

function addTask() {
  const title = document.getElementById("taskInput").value.trim();
  const priority = document.getElementById("priorityInput").value;
  const deadline = document.getElementById("dateInput").value;

  if (!title) {
    alert("Task cannot be empty");
    return;
  }

  tasks.push({
    id: Date.now(),
    title,
    priority,
    deadline,
    completed: false
  });

  saveTasks();
  renderTasks();

  document.getElementById("taskInput").value = "";
}

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}


function toggleTask(id) {
  tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
  saveTasks();
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

function setFilter(filter) {
  currentFilter = filter;
  debouncedRender();
}

function sortTasks(list) {
  const type = document.getElementById("sortSelect").value;

  if (type === "priority") {
    const priorityOrder = {High: 3, Medium: 2, Low: 1};
    return list.sort((a,b) => priorityOrder[b.priority] - priorityOrder[a.priority]);
  }

  if (type === "deadline") {
    return list.sort((a,b) => new Date(a.deadline) - new Date(b.deadline));
  }

  return list;
}

function renderTasks() {
  let filtered = [...tasks];

  if (currentFilter === "completed") {
    filtered = filtered.filter(t => t.completed);
  } else if (currentFilter === "pending") {
    filtered = filtered.filter(t => !t.completed);
  }

  filtered = sortTasks(filtered);

  const today = new Date().toISOString().split("T")[0];

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  filtered.forEach(task => {
    const isOverdue = task.deadline && task.deadline < today;

    let badgeClass = {
      Low: "bg-success",
      Medium: "bg-warning",
      High: "bg-danger"
    }[task.priority];

    const div = document.createElement("div");
    div.className = `card mb-2 ${isOverdue ? "overdue" : ""}`;

    div.innerHTML = `
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="${task.completed ? "completed" : ""}">${task.title}</h5>
          <span class="badge ${badgeClass}">${task.priority}</span>
          <small class="ms-2">${task.deadline || ""}</small>
        </div>

        <div>
          <button class="btn btn-sm btn-success me-2" onclick="toggleTask(${task.id})">
            ✔
          </button>
          <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">
            🗑
          </button>
        </div>
      </div>
    `;

    list.appendChild(div);
  });

  updateCounters();
}

function updateCounters() {
  document.getElementById("totalCount").innerText = tasks.length;
  document.getElementById("completedCount").innerText = tasks.filter(t => t.completed).length;
  document.getElementById("pendingCount").innerText = tasks.filter(t => !t.completed).length;
}

document.getElementById("sortSelect").addEventListener("change", renderTasks);

renderTasks();
</script>

</body>
</html>
